name: Build and Push Docker Image

on:
  push:
    branches:
      - wolvia-main  # Main Wolvia branch - pushes to prod ECR
      - wolvia-dev   # Dev Wolvia branch - pushes to dev ECR
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-2
  # IMPORTANT: Update this when merging new upstream Open WebUI versions
  UPSTREAM_VERSION: "0.8.10"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC authentication to AWS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for version calculation
          fetch-tags: true  # Fetch tags for version detection

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::117433957365:role/cicd-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine version and environment
        id: version
        run: |
          # Determine environment from branch
          if [ "${{ github.ref }}" = "refs/heads/wolvia-main" ]; then
            ENV="prod"
          else
            ENV="dev"
          fi

          # Count commits since the upstream merge tag
          # This gives us 0.6.36-wolvia.1, 0.6.36-wolvia.2, etc.
          # Only counts Wolvia-specific commits, not entire upstream history
          UPSTREAM_TAG="v${{ env.UPSTREAM_VERSION }}"

          # Check if upstream tag exists
          if git rev-parse "$UPSTREAM_TAG" >/dev/null 2>&1; then
            # Count commits since the upstream tag
            COMMIT_COUNT=$(git rev-list --count ${UPSTREAM_TAG}..HEAD)
          else
            # Fallback: count all commits (shouldn't happen if UPSTREAM_VERSION is correct)
            COMMIT_COUNT=$(git rev-list --count HEAD)
            echo "⚠️  Warning: Upstream tag $UPSTREAM_TAG not found, counting all commits"
          fi

          VERSION="${{ env.UPSTREAM_VERSION }}-wolvia.${COMMIT_COUNT}"

          # Also get git SHA for additional traceability
          GIT_SHA=$(git rev-parse --short HEAD)

          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "git_sha=${GIT_SHA}" >> $GITHUB_OUTPUT

          echo "📦 Building for environment: ${ENV}"
          echo "📦 Version: ${VERSION}"
          echo "📦 Git SHA: ${GIT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Push to both dev and prod ECR repos for easier testing
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/wolvia-dev-openwebui:${{ steps.version.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/wolvia-dev-openwebui:${{ steps.version.outputs.git_sha }}
            ${{ steps.login-ecr.outputs.registry }}/wolvia-dev-openwebui:latest
            ${{ steps.login-ecr.outputs.registry }}/wolvia-prod-openwebui:${{ steps.version.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/wolvia-prod-openwebui:${{ steps.version.outputs.git_sha }}
            ${{ steps.login-ecr.outputs.registry }}/wolvia-prod-openwebui:latest
          # Use both GHA cache and ECR registry cache for faster builds
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/wolvia-prod-openwebui:latest
          cache-to: type=gha,mode=max
          platforms: linux/amd64  # Match ECS X86_64 architecture

      - name: Output build summary
        run: |
          echo "## 🎉 Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.version.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ steps.version.outputs.git_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ECR Images Tagged:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.version.outputs.git_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Update \`terraform/environments/${{ steps.version.outputs.environment }}/main.tf\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Set \`openwebui_version = \"${{ steps.version.outputs.version }}\"\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Run \`./scripts/push-and-wait.sh\` to deploy" >> $GITHUB_STEP_SUMMARY

      - name: Print version
        run: |
          echo ""
          echo "========================================"
          echo "VERSION: ${{ steps.version.outputs.version }}"
          echo "========================================"
          echo ""
