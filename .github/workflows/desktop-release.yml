name: Desktop App Release

on:
  push:
    branches:
      - wolvia-main
  workflow_dispatch:  # Manual trigger for testing

env:
  # IMPORTANT: Keep in sync with docker-build.yml
  UPSTREAM_VERSION: "0.7.2"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          UPSTREAM_TAG="v${{ env.UPSTREAM_VERSION }}"
          if git rev-parse "$UPSTREAM_TAG" >/dev/null 2>&1; then
            COMMIT_COUNT=$(git rev-list --count ${UPSTREAM_TAG}..HEAD)
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi
          VERSION="${{ env.UPSTREAM_VERSION }}-wolvia.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Desktop version: ${VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Update package.json version
        working-directory: desktop
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Build macOS (arm64 + x64)
        working-directory: desktop
        run: npm run dist:mac -- --arm64 --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        shell: bash
        run: |
          UPSTREAM_TAG="v${{ env.UPSTREAM_VERSION }}"
          if git rev-parse "$UPSTREAM_TAG" >/dev/null 2>&1; then
            COMMIT_COUNT=$(git rev-list --count ${UPSTREAM_TAG}..HEAD)
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi
          VERSION="${{ env.UPSTREAM_VERSION }}-wolvia.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Update package.json version
        working-directory: desktop
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Build Windows
        working-directory: desktop
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: desktop/release/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          UPSTREAM_TAG="v${{ env.UPSTREAM_VERSION }}"
          if git rev-parse "$UPSTREAM_TAG" >/dev/null 2>&1; then
            COMMIT_COUNT=$(git rev-list --count ${UPSTREAM_TAG}..HEAD)
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi
          VERSION="${{ env.UPSTREAM_VERSION }}-wolvia.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Update package.json version
        working-directory: desktop
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Build Linux
        working-directory: desktop
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
          if-no-files-found: error

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          UPSTREAM_TAG="v${{ env.UPSTREAM_VERSION }}"
          if git rev-parse "$UPSTREAM_TAG" >/dev/null 2>&1; then
            COMMIT_COUNT=$(git rev-list --count ${UPSTREAM_TAG}..HEAD)
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi
          VERSION="${{ env.UPSTREAM_VERSION }}-wolvia.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}
          name: Wolvia Desktop ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            Wolvia Desktop App v${{ steps.version.outputs.version }}

            **Downloads:**
            - macOS (Apple Silicon): `Wolvia-*-arm64.dmg`
            - macOS (Intel): `Wolvia-*-x64.dmg`
            - Windows: `Wolvia-*-Setup.exe`
            - Linux: `Wolvia-*.AppImage` or `.deb`

            **First launch on macOS:** Right-click → Open (bypasses Gatekeeper for unsigned app)
          files: |
            artifacts/macos-builds/*
            artifacts/windows-builds/*
            artifacts/linux-builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output summary
        run: |
          echo "## 🖥️ Desktop Release Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from: https://github.com/${{ github.repository }}/releases/tag/desktop-v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
