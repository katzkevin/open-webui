<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connection Error - Wolvia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.8;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #fff;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      color: #a0a0a0;
    }

    .server-url {
      font-family: monospace;
      background: rgba(255, 255, 255, 0.1);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      margin: 1rem 0;
      word-break: break-all;
      font-size: 0.9rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
    }

    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
    }

    .btn-primary:hover {
      background: #4338ca;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .help-text {
      font-size: 0.85rem;
      color: #707070;
      margin-top: 2rem;
    }

    .help-text code {
      background: rgba(255, 255, 255, 0.1);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔌</div>
    <h1>Unable to Connect</h1>
    <p>
      Could not connect to the Wolvia server. Please make sure the server is running and accessible.
    </p>
    <div class="server-url" id="serverUrl">http://localhost:8080</div>
    <div class="actions">
      <button class="btn-primary" onclick="retry()">Retry Connection</button>
    </div>
    <p class="help-text">
      To use a different server, set the <code>OPEN_WEBUI_URL</code> environment variable.
    </p>
  </div>

  <script>
    function retry() {
      window.location.reload();
    }

    // Try to get the actual server URL from the environment
    // (This is a placeholder - in practice, the URL would need to be passed from main process)
    document.getElementById('serverUrl').textContent =
      new URLSearchParams(window.location.search).get('url') || 'http://localhost:8080';
  </script>
</body>
</html>
